<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="home">
  <div id="shell"></div>
  <div id="page-body" class="dashboard-redesign">
    <h1 id="dashboardTitle">Dashboard</h1>
    <p class="lead">Log closes and track commission toward your target.</p>

    <header class="dash-header">
      <div class="dash-tracker-stack" id="sales-tracker">
        <section class="dash-goal-tracker-card" aria-label="Goal progress">
          <div class="dash-progress-panel">
            <div class="dash-goal-controls">
              <div class="dash-goal-metrics">
                <label class="dash-goal-stat dash-goal-editor" for="goalInput">
                  <span class="dash-tracker-label">Goal</span>
                  <input id="goalInput" type="number" min="1" step="100" value="1000" inputmode="numeric" aria-label="Monthly goal amount">
                </label>
                <div class="dash-goal-stats-right">
                  <div class="dash-goal-stat dash-earned-stat" aria-live="polite">
                    <span class="dash-tracker-label">Commission earned</span>
                    <strong class="dash-stat-value dash-earned-value" id="totalRevenue">$0</strong>
                  </div>
                  <div class="dash-goal-stat dash-closes-stat" aria-live="polite">
                    <span class="dash-tracker-label">Sales</span>
                    <strong class="dash-stat-value" id="salesCount">0</strong>
                  </div>
                </div>
              </div>
            </div>

            <div class="dash-goal-ring-card">
              <div class="dash-goal-ring" id="progressOrbit">
                <svg class="dash-goal-ring-svg" viewBox="0 0 280 280" role="img" aria-labelledby="progressLabel">
                  <title id="progressLabel">Income goal completion progress</title>
                  <circle class="dash-goal-ring-track" cx="140" cy="140" r="118" fill="none"></circle>
                  <circle class="dash-goal-ring-fill" id="progressRing" cx="140" cy="140" r="118" fill="none"></circle>
                </svg>
                <div class="dash-goal-ring-center">
                  <span class="dash-goal-ring-pct" id="completionPercent">0%</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="dash-work-panels-card" aria-label="Sales">
          <div class="dash-sales-work-stack">
            <section class="dash-sales-log-section" id="dash-sales-log-section" aria-labelledby="dash-sales-log-heading">
              <h3 class="dash-sales-log-heading" id="dash-sales-log-heading">Log a sale</h3>
              <form class="dash-income-form dash-income-form--static" id="incomeForm" method="dialog">
                <div class="dash-income-form-grid">
                  <label class="dash-income-field">
                    <span class="dash-income-field-label">Sale amount</span>
                    <span class="dash-income-amount-wrap">
                      <span class="dash-income-currency" aria-hidden="true">$</span>
                      <input id="saleAmount" type="number" min="1" step="0.01" placeholder="1250" inputmode="decimal" required>
                    </span>
                  </label>

                  <label class="dash-income-field">
                    <span class="dash-income-field-label">Business name <span class="dash-income-field-optional">(optional)</span></span>
                    <input id="businessName" type="text" placeholder="Bobby's Burgerr">
                  </label>
                </div>

                <button class="btn dash-income-submit" type="submit">Save sale</button>
              </form>
            </section>

            <section class="dash-sales-history-section" aria-labelledby="dash-sales-history-heading">
              <header class="dash-sales-history-head">
                <h3 class="dash-sales-history-heading" id="dash-sales-history-heading">Sales</h3>
                <span class="dash-sales-count-badge" id="dash-sales-count">0 sales</span>
              </header>

              <div class="dash-sales-list-wrap">
                <div class="sales-list dash-sales-list" id="salesList" aria-live="polite"></div>
              </div>
            </section>
          </div>
        </section>

        <section class="dash-pending-island-card dash-pending-island" aria-label="Pending businesses">
          <div
            class="dash-toggle-card dash-pending-section dash-pending-section--empty dash-pending-loading"
            id="dash-pending-section"
            data-dash-toggle="pending"
          >
            <button
              type="button"
              class="dash-toggle-btn"
              id="dash-pending-toggle"
              aria-expanded="false"
              aria-controls="dash-pending-panel"
            >
              <span class="dash-toggle-main">
                <span class="dash-toggle-title">Pending businesses</span>
              </span>
              <span class="dash-toggle-meta">
                <span class="dash-pending-load" id="dash-pending-load" role="status" aria-label="Loading pending businesses">
                  <span class="dash-pending-load-spinner" aria-hidden="true"></span>
                </span>
                <span class="dash-toggle-count" id="dash-pending-count">0 pending</span>
              </span>
            </button>

            <div class="dash-toggle-panel" id="dash-pending-panel" aria-hidden="true">
              <div class="dash-toggle-panel-inner">
                <div class="dash-empty dash-pending-empty" id="dash-pending-empty">
                  <p class="dash-empty-title">No pending leads</p>
                  <p class="dash-empty-desc">Send a lead from <strong>Lead Builder</strong> to add a business here.</p>
                </div>

                <ul class="dash-pending-list dash-toggle-pending-list" id="dash-pending-list" hidden></ul>
              </div>
            </div>
          </div>
        </section>
      </div>
    </header>

    <dialog class="owner-console-dialog" id="owner-confirmed-sale-dialog" aria-labelledby="owner-confirmed-sale-title">
      <div class="owner-console-dialog-panel">
        <h2 class="owner-console-dialog-title" id="owner-confirmed-sale-title">Owner confirmed sale</h2>
        <dl class="owner-console-dialog-details" id="owner-confirmed-sale-details"></dl>
        <div class="owner-console-dialog-actions">
          <button type="button" class="btn" id="owner-confirmed-sale-close">Close</button>
        </div>
      </div>
    </dialog>

    <script src="js/tracker-preflash.js"></script>
  </div>
  <script src="js/config.js"></script>
  <script src="js/private-config.js"></script>
  <script src="js/config-merge.js"></script>
  <script src="js/image-preload.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/rep-session.js"></script>
  <script src="js/rep-settings-sync.js"></script>
  <script src="js/user-prefs.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/lock.js"></script>
  <script src="js/layout-fix.js"></script>
  <script src="js/lead-csv-format.js"></script>
  <script src="js/leads-loader.js"></script>
  <script src="js/lead-sync.js"></script>
  <script src="js/lead-display.js"></script>
  <script src="js/pending-lead-builder.js"></script>
  <script src="js/dashboard-pending.js"></script>
  <script src="js/goal-celebration.js"></script>
  <script src="js/course-modules.js"></script>
  <script src="js/owner-confirmed-sale-details.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
